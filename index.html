<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة خاصة | م / محمد سليمان</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --night-bg: #020617;
            --sunrise-bg: linear-gradient(180deg, #ffafbd 0%, #ffc3a0 100%);
            --white: #fffdf5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--night-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Amiri', serif;
            transition: background 3s ease-in-out;
            cursor: pointer;
        }

        /* تأثير سماء الفجر عند التفعيل */
        body.is-eid {
            background: radial-gradient(circle at top, #334d50, #cbcaa5);
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 90%;
            max-width: 600px;
        }

        /* الهلال المركزي */
        .moon-icon {
            font-size: 80px;
            color: var(--gold);
            filter: drop-shadow(0 0 20px var(--gold));
            margin-bottom: 30px;
            transition: all 2s ease;
            display: inline-block;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

        .is-eid .moon-icon {
            transform: translateY(-50px) scale(0.8);
            filter: drop-shadow(0 0 40px #fff);
            color: #fff;
        }

        /* نصوص التهنئة */
        .content {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.5s ease 1s;
        }

        .is-eid .content {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 4rem;
            color: var(--white);
            margin-bottom: 20px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .message {
            font-size: 1.8rem;
            color: var(--white);
            line-height: 1.8;
            margin-bottom: 50px;
        }

        /* توقيع م / محمد سليمان مع اللمعة الذهبية */
        .signature-box {
            position: relative;
            display: inline-block;
            margin-top: 20px;
        }

        .signature {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--gold);
            padding: 10px 30px;
            border-top: 1px solid var(--gold);
            border-bottom: 1px solid var(--gold);
            position: relative;
            overflow: hidden;
        }

        /* تأثير اللمعة (Shine) */
        .signature::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-25deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .hint {
            position: fixed;
            bottom: 30px;
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }

        .is-eid .hint { display: none; }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        /* نجوم الخلفية */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            50% { opacity: 0.1; }
        }
    </style>
</head>
<body onclick="startEid()">

    <div id="stars-container"></div>

    <div class="container">
        <div class="moon-icon" id="moon">🌙</div>
        
        <div class="content">
            <h1>عيد فطر مبارك</h1>
            <p class="message">
               خَتَمَ اللَّهُ صِيَامَكُم بِالْقَبُولِ، وَأَسْكَنَكُمُ الْجَنَّةَ مَعَ الرَّسُولِ ﷺ، وَجَعَلَ عِيدَكُمْ عِيدَ فَرْحَةٍ وَبَهْجَةٍ وَسَعَادَةٍ لَا تَزُولُ.
عِيدُكُم مُبَارَك، وَكُلُّ عَامٍ وَأَنْتُمْ بِخَيْرٍ 🤍🌙✨<br>
            
            </p>
            
            <div class="signature-box">
                <div class="signature">م / محمد سليمان</div>
            </div>
        </div>
    </div>

    <div class="hint">اضغط لاستقبال العيد ✨</div>

    <script>
        // إنشاء نجوم عشوائية في الخلفية
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + 'vh';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }

        function startEid() {
            document.body.classList.add('is-eid');
            
            // صوت فرقعة الـ Confetti بشكل احترافي
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
              confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#d4af37', '#ffffff']
              });
              confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#d4af37', '#ffffff']
              });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
        }
    </script>
</body>
</html>
